<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Image Gallery</h1>

    <!-- Filter Buttons -->
    <div class="filters">
        <button onclick="filterImages('all')">All</button>
        <button onclick="filterImages('nature')">Nature</button>
        <button onclick="filterImages('city')">City</button>
    </div>

 <div class="gallery">

    <img src="https://picsum.photos/id/1003/300" class="image nature" onclick="openLightbox(0)">
    <img src="https://picsum.photos/id/1016/300" class="image nature" onclick="openLightbox(1)">
    <img src="https://picsum.photos/id/1005/300" class="image nature" onclick="openLightbox(2)">
    <img src="https://picsum.photos/id/1006/300" class="image nature" onclick="openLightbox(3)">
    <img src="https://picsum.photos/id/1018/300" class="image nature" onclick="openLightbox(4)">
    <img src="https://picsum.photos/id/1020/300" class="image nature" onclick="openLightbox(5)">
    <img src="https://picsum.photos/id/1011/300" class="image nature" onclick="openLightbox(6)">
    <img src="https://picsum.photos/id/1012/300" class="image nature" onclick="openLightbox(7)">
   


    <img src="https://images.unsplash.com/photo-1494526585095-c41746248156?auto=format&fit=crop&w=600&q=80" class="image city" onclick="openLightbox(8)">
    <img src="https://images.unsplash.com/photo-1512453979798-5ea266f8880c?auto=format&fit=crop&w=600&q=80" class="image city" onclick="openLightbox(9)">
    <img src="https://images.unsplash.com/photo-1501594907352-04cda38ebc29?auto=format&fit=crop&w=600&q=80" class="image city" onclick="openLightbox(10)">
</div>

    <div id="lightbox">
        <span class="close" onclick="closeLightbox()">×</span>
        <img id="lightbox-img">
        <button class="prev" onclick="changeImage(-1)">❮</button>
        <button class="next" onclick="changeImage(1)">❯</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
